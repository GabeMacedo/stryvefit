<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Your Profile | STRYVEFIT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="bficha.css" />
</head>

<body data-pagina="bficha">

  <section class="hero hero-ficha">
    <div class="hero-overlay"></div>

    <div class="overlay">

      <span class="etapa">STEP 2 OF 8</span>

      <h1 class="titulo">
        Let’s understand your <span>body</span>
      </h1>

      <p class="descricao">
        Takes less than 20 seconds. With this, we can already create a smarter foundation for your plan.
      </p>

      <div class="ficha-box">

        <div class="grupo-form">

          <label for="nome">
            Your name
          </label>

          <input
            type="text"
            id="nome"
            name="nome"
            placeholder="Enter your name"
            autocomplete="name"
            inputmode="text"
          />

        </div>

        <div class="duas-colunas">

          <div class="grupo-form">

            <label for="idade">
              Age
            </label>

            <input
              type="number"
              id="idade"
              name="idade"
              placeholder="Ex: 21"
              min="10"
              max="100"
              inputmode="numeric"
            />

          </div>

          <div class="grupo-form">

            <label for="sexo">
              Gender
            </label>

            <select id="sexo" name="sexo" autocomplete="sex">
              <option value="">Select</option>
              <option value="masculino">Male</option>
              <option value="feminino">Female</option>
            </select>

          </div>

        </div>

        <div class="duas-colunas">

          <div class="grupo-form">

            <label for="peso">
              Weight (kg)
            </label>

            <input
              type="number"
              id="peso"
              name="peso"
              placeholder="Ex: 72"
              min="20"
              max="300"
              step="0.1"
              inputmode="decimal"
            />

          </div>

          <div class="grupo-form">

            <label for="altura">
              Height (cm)
            </label>

            <input
              type="number"
              id="altura"
              name="altura"
              placeholder="Ex: 175"
              min="100"
              max="250"
              inputmode="numeric"
            />

          </div>

        </div>

        <button class="botao" id="btnContinuarFicha" type="button">
          CONTINUE
        </button>

        <p class="texto-ajuda">
          Your information is only used to personalize your initial recommendation.
        </p>

      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
