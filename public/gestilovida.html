<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Lifestyle | STRYVEFIT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" type="image/png" href="Img/favicon.png.png" />
  <link
  
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="gestilovida.css" />
</head>

<body data-pagina="gestilovida">

  <section class="hero">
    <div class="hero-overlay"></div>

    <div class="overlay">
      <span class="etapa">STEP 7 OF 8</span>

      <h1 class="titulo">
        Your <span>lifestyle</span>
      </h1>

      <p class="descricao">
        Your results also depend on your routine, your sleep, and how well your body can recover.
      </p>

      <div class="estilo-box">
        <h2 class="subtitulo">How many hours do you <span>sleep</span> per night?</h2>

        <div class="horas-sono" id="horasSonoOpcoes">
          <button type="button" data-value="menos-5">Less than 5h</button>
          <button type="button" data-value="5-6">5 to 6h</button>
          <button type="button" data-value="7-8">7 to 8h</button>
          <button type="button" data-value="mais-8">More than 8h</button>
        </div>

        <h2 class="subtitulo bloco-titulo">How is your <span>stress level</span>?</h2>

        <div class="estresse" id="estresseOpcoes">
          <button type="button" data-value="baixo">Low</button>
          <button type="button" data-value="medio">Medium</button>
          <button type="button" data-value="alto">High</button>
        </div>

        <h2 class="subtitulo bloco-titulo">What is your <span>daily routine</span> like?</h2>

        <div class="trabalho" id="rotinaOpcoes">
          <button type="button" data-value="parado">Mostly inactive</button>
          <button type="button" data-value="moderado">Moderate</button>
          <button type="button" data-value="corrida">Busy / intense</button>
        </div>

        <button class="botao" id="btnContinuarEstilo" type="button">
          CONTINUE
        </button>

        <p class="texto-ajuda">
          This step helps adjust recovery, intensity, and expected results.
        </p>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
