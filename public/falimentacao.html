<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alimentação | STRYVEFIT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="falimentacao.css" />
</head>
<body data-pagina="falimentacao">

  <section class="hero">
    <div class="hero-overlay"></div>

    <div class="overlay">
      <span class="etapa">ETAPA 6 DE 8</span>

      <h1 class="titulo">
        Agora vamos olhar sua <span>alimentação</span>
      </h1>

      <p class="descricao">
        Isso ajuda a entender melhor sua rotina e montar uma direção mais realista para seu resultado.
      </p>

      <div class="alimentacao-box">
        <h2 class="subtitulo">Como está sua <span>alimentação hoje</span>?</h2>

        <div class="opcoes" id="alimentacaoOpcoes">
          <button type="button" data-value="ruim">Ruim</button>
          <button type="button" data-value="mais-ou-menos">Mais ou menos</button>
          <button type="button" data-value="boa">Boa</button>
          <button type="button" data-value="muito-boa">Muito boa</button>
        </div>

        <h2 class="subtitulo refeicoes-titulo">Quantas <span>refeições</span> você faz por dia?</h2>

        <div class="refeicoes" id="refeicoesOpcoes">
          <button type="button" data-value="1">1</button>
          <button type="button" data-value="2">2</button>
          <button type="button" data-value="3">3</button>
          <button type="button" data-value="4">4</button>
          <button type="button" data-value="5">5</button>
          <button type="button" data-value="6">6+</button>
        </div>

        <button class="botao" id="btnContinuarAlimentacao" type="button">
          CONTINUAR
        </button>

        <p class="texto-ajuda">
          Não precisa ser perfeito. O importante é entender sua base atual.
        </p>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
