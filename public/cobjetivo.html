<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Your Goal | STRYVEFIT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" type="image/png" href="Img/favicon.png.png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="cobjetivo.css" />
</head>

<body data-pagina="cobjetivo">

  <section class="hero">
    <div class="hero-overlay"></div>

    <div class="overlay">

      <span class="etapa">STEP 3 OF 8</span>

      <h1 class="titulo">
        Now let’s define your <span>goal</span>
      </h1>

      <p class="descricao">
        This helps us better define your training style, intensity, and initial strategy.
      </p>

      <div class="objetivo-box">

        <h2 class="subtitulo">
          What is your <span>main goal</span>?
        </h2>

        <div class="opcoes" id="objetivoOpcoes">

          <button type="button" data-value="emagrecer">
            Lose weight
          </button>

          <button type="button" data-value="ganhar-massa">
            Build muscle
          </button>

          <button type="button" data-value="definir">
            Get lean / toned
          </button>

          <button type="button" data-value="condicionamento">
            Improve conditioning
          </button>

        </div>

        <h2 class="subtitulo dias-titulo">
          How many days per week do you <span>train</span>?
        </h2>

        <div class="dias" id="diasOpcoes">

          <button type="button" data-value="1">1 day</button>
          <button type="button" data-value="2">2 days</button>
          <button type="button" data-value="3">3 days</button>
          <button type="button" data-value="4">4 days</button>
          <button type="button" data-value="5">5 days</button>
          <button type="button" data-value="6">6 days</button>
          <button type="button" data-value="7">7 days</button>

        </div>

        <button class="botao" id="btnContinuarObjetivo" type="button">
          CONTINUE
        </button>

        <p class="texto-ajuda">
          The clearer this foundation is, the more personalized and effective your plan becomes.
        </p>

      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
